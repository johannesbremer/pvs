description: Prepares the repo for CI jobs that only need Node.js and pnpm
name: Prepare Node
runs:
  steps:
    - name: Set up pnpm
      uses: pnpm/action-setup@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        cache: pnpm
        node-version: 22.x
    - name: Install dependencies
      run: pnpm install --frozen-lockfile
      shell: bash
  using: composite
